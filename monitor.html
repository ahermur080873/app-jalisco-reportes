<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Emergencias - Botón de Pánico</title>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f1a; color: #fff; }
        .header { background: #0f0f1a; padding: 12px 20px; border-bottom: 2px solid #dc3545; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header h1 { font-size: 1.5rem; }
        .status { background: #dc3545; padding: 5px 15px; border-radius: 30px; font-size: 0.8rem; font-weight: bold; }
        .dashboard { display: flex; height: calc(100% - 65px); }
        .mapa { flex: 2; }
        #map { height: 100%; width: 100%; }
        .panel { flex: 1; background: #16213e; padding: 15px; overflow-y: auto; border-left: 2px solid #dc3545; }
        .card { background: #0f0f1a; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        .card h3 { margin-bottom: 10px; font-size: 0.9rem; color: #dc3545; }
        .fila { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #2a2a3e; font-size: 0.8rem; flex-wrap: wrap; gap: 5px; }
        .btn { background: #dc3545; border: none; color: white; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .badge-aceptado { background: #28a745; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .badge-camino { background: #17a2b8; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .badge-pendiente { background: #ffc107; color: #000; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .sin-datos { text-align: center; padding: 20px; color: #888; font-size: 0.8rem; }
        @media (max-width: 700px) { .dashboard { flex-direction: column; } .panel { max-height: 400px; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚨 Monitoreo de Emergencias - Botón de Pánico</h1>
        <div class="status" id="status">🔴 SISTEMA ACTIVO</div>
    </div>
    <div class="dashboard">
        <div class="mapa"><div id="map"></div></div>
        <div class="panel">
            <div class="card"><h3>📍 EMERGENCIA ACTIVA</h3><div id="emergencia" class="sin-datos">Cargando...</div></div>
            <div class="card"><h3>🕒 ÚLTIMAS UBICACIONES</h3><div id="ubicaciones" class="sin-datos">Cargando...</div></div>
            <div class="card"><h3>👮 POLICÍAS CERCANOS</h3><div id="policias" class="sin-datos">Cargando...</div></div>
            <div class="card"><h3>🔔 NOTIFICACIONES</h3><div id="notificaciones" class="sin-datos">Cargando...</div></div>
            <button class="btn" id="btnRefresh">🔄 ACTUALIZAR</button>
        </div>
    </div>
    <script>
        (function() {
            // ============================================
            // CONFIGURACIÓN DE SUPABASE - SOLO UNA VEZ
            // ============================================
            const SUPABASE_URL = 'https://dujmncbgyamphqvuiroy.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_DGG5SJplcQytcpqBCA59cg_SJZBdM0A';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            // ============================================
            // VARIABLES GLOBALES DEL MAPA
            // ============================================
            let map;
            let eventoMarker = null;
            let rutaLinea = null;
            let policiasMarkers = [];
            let ubicacionesMarkers = [];
            let intervalo = null;
            
            // ============================================
            // INICIALIZAR MAPA
            // ============================================
            function initMap() {
                map = L.map('map').setView([20.6761, -103.3476], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { 
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>' 
                }).addTo(map);
                console.log('✅ Mapa iniciado');
            }
            
            // ============================================
            // ESTILOS DE LOS MARCADORES
            // ============================================
            function getEventoStyle() {
                return { radius: 18, fillColor: '#dc3545', color: '#ffffff', weight: 3, opacity: 1, fillOpacity: 0.9 };
            }
            
            function getPoliciaStyle() {
                return { radius: 12, fillColor: '#00b4d8', color: '#ffffff', weight: 2, opacity: 1, fillOpacity: 0.8 };
            }
            
            function getUbicacionStyle() {
                return { radius: 7, fillColor: '#ffc107', color: '#ffffff', weight: 1, opacity: 1, fillOpacity: 0.9 };
            }
            
            // ============================================
            // CARGAR EMERGENCIA ACTIVA, TRAYECTORIA Y NOTIFICACIONES
            // ============================================
            async function cargarEmergencia() {
                try {
                    const { data: evento, error } = await supabase
                        .from('eventos_emergencia')
                        .select('*')
                        .eq('estado', 'activo')
                        .order('fecha_activacion', { ascending: false })
                        .limit(1);
                    
                    if (error) {
                        console.error('Error cargando evento:', error);
                        return;
                    }
                    
                    if (evento && evento.length > 0) {
                        const e = evento[0];
                        document.getElementById('status').innerHTML = '🔴 EMERGENCIA ACTIVA';
                        
                        // Obtener nombre del ciudadano
                        let nombreCiudadano = 'Ciudadano';
                        const { data: ciudadano } = await supabase
                            .from('usuarios')
                            .select('nombre_completo')
                            .eq('id_usuario', e.id_usuario)
                            .single();
                        if (ciudadano) nombreCiudadano = ciudadano.nombre_completo;
                        
                        const minutosActivo = Math.floor((new Date() - new Date(e.fecha_activacion)) / 60000);
                        
                        document.getElementById('emergencia').innerHTML = `
                            <div class="fila"><strong>ID:</strong> #${e.id_evento}</div>
                            <div class="fila"><strong>Ciudadano:</strong> ${nombreCiudadano}</div>
                            <div class="fila"><strong>Activo hace:</strong> ${minutosActivo} min</div>
                            <div class="fila"><strong>Ubicación inicial:</strong> ${e.latitud.toFixed(5)}, ${e.longitud.toFixed(5)}</div>
                        `;
                        
                        // Marcador de emergencia
                        if (eventoMarker) map.removeLayer(eventoMarker);
                        eventoMarker = L.circleMarker([e.latitud, e.longitud], getEventoStyle())
                            .addTo(map)
                            .bindPopup(`🚨 EMERGENCIA ACTIVA<br>ID: ${e.id_evento}<br>Ciudadano: ${nombreCiudadano}`);
                        map.setView([e.latitud, e.longitud], 14);
                        
                        // Cargar trayectoria
                        await cargarTrayectoria(e.id_evento);
                        
                        // Cargar notificaciones
                        await cargarNotificaciones(e.id_evento);
                        
                    } else {
                        document.getElementById('status').innerHTML = '🟢 SISTEMA ACTIVO';
                        document.getElementById('emergencia').innerHTML = '<div class="sin-datos">✅ No hay emergencias activas</div>';
                        document.getElementById('ubicaciones').innerHTML = '<div class="sin-datos">Sin emergencia activa</div>';
                        document.getElementById('notificaciones').innerHTML = '<div class="sin-datos">Sin emergencia activa</div>';
                        
                        if (eventoMarker) map.removeLayer(eventoMarker);
                        eventoMarker = null;
                        if (rutaLinea) map.removeLayer(rutaLinea);
                        rutaLinea = null;
                        ubicacionesMarkers.forEach(m => map.removeLayer(m));
                        ubicacionesMarkers = [];
                    }
                } catch (err) {
                    console.error('Error en cargarEmergencia:', err);
                }
            }
            
            // ============================================
            // CARGAR TRAYECTORIA DE LA EMERGENCIA
            // ============================================
            async function cargarTrayectoria(eventoId) {
                try {
                    const { data: ubicaciones, error } = await supabase
                        .from('emergencia_ubicaciones')
                        .select('*')
                        .eq('id_evento', eventoId)
                        .order('timestamp', { ascending: true });
                    
                    if (error) {
                        console.error('Error cargando trayectoria:', error);
                        return;
                    }
                    
                    // Limpiar elementos anteriores
                    if (rutaLinea) map.removeLayer(rutaLinea);
                    ubicacionesMarkers.forEach(m => map.removeLayer(m));
                    ubicacionesMarkers = [];
                    
                    if (ubicaciones && ubicaciones.length > 0) {
                        // Línea de trayectoria
                        const puntos = ubicaciones.map(u => [u.latitud, u.longitud]);
                        rutaLinea = L.polyline(puntos, { color: '#ffc107', weight: 3, opacity: 0.8 }).addTo(map);
                        
                        // Marcadores de ubicaciones
                        ubicaciones.forEach(u => {
                            const marker = L.circleMarker([u.latitud, u.longitud], getUbicacionStyle())
                                .addTo(map)
                                .bindPopup(`🕒 ${new Date(u.timestamp).toLocaleTimeString()}<br>📍 ${u.latitud.toFixed(5)}, ${u.longitud.toFixed(5)}`);
                            ubicacionesMarkers.push(marker);
                        });
                        
                        // Mostrar últimas 5 ubicaciones en el panel
                        const ultimas = ubicaciones.slice(-5).reverse();
                        document.getElementById('ubicaciones').innerHTML = ultimas.map(u => `
                            <div class="fila">
                                <span>🕒 ${new Date(u.timestamp).toLocaleTimeString()}</span>
                                <span>📍 ${u.latitud.toFixed(5)}, ${u.longitud.toFixed(5)}</span>
                            </div>
                        `).join('');
                    } else {
                        document.getElementById('ubicaciones').innerHTML = '<div class="sin-datos">📡 Esperando ubicaciones...</div>';
                    }
                } catch (err) {
                    console.error('Error en cargarTrayectoria:', err);
                }
            }
            
            // ============================================
            // CARGAR NOTIFICACIONES DE LA EMERGENCIA
            // ============================================
            async function cargarNotificaciones(eventoId) {
                try {
                    const { data: notificaciones, error } = await supabase
                        .from('notificaciones_emergencia_agentes')
                        .select('*, usuarios!inner(nombre_completo)')
                        .eq('id_evento', eventoId)
                        .order('notificado_en', { ascending: false });
                    
                    if (error) {
                        console.error('Error cargando notificaciones:', error);
                        return;
                    }
                    
                    const getBadgeClass = (respuesta) => {
                        if (respuesta === 'aceptada') return 'badge-aceptado';
                        if (respuesta === 'en camino') return 'badge-camino';
                        return 'badge-pendiente';
                    };
                    
                    if (notificaciones && notificaciones.length > 0) {
                        document.getElementById('notificaciones').innerHTML = notificaciones.map(n => `
                            <div class="fila">
                                <span>👮 ${n.usuarios?.nombre_completo || 'Agente'}</span>
                                <span class="${getBadgeClass(n.respuesta)}">${n.respuesta}</span>
                            </div>
                        `).join('');
                    } else {
                        document.getElementById('notificaciones').innerHTML = '<div class="sin-datos">Sin notificaciones</div>';
                    }
                } catch (err) {
                    console.error('Error en cargarNotificaciones:', err);
                }
            }
            
            // ============================================
            // CARGAR POLICÍAS CERCANOS
            // ============================================
            async function cargarPolicias() {
                try {
                    const { data: policias, error } = await supabase
                        .from('agentes_ubicacion')
                        .select('*, usuarios!inner(nombre_completo)')
                        .eq('disponible', true);
                    
                    if (error) {
                        console.error('Error cargando policías:', error);
                        return;
                    }
                    
                    // Limpiar marcadores anteriores
                    policiasMarkers.forEach(m => map.removeLayer(m));
                    policiasMarkers = [];
                    
                    if (policias && policias.length > 0) {
                        document.getElementById('policias').innerHTML = policias.map(p => `
                            <div class="fila">
                                <span>👮 ${p.usuarios?.nombre_completo || 'Policía'}</span>
                                <span>📍 ${p.latitud.toFixed(5)}, ${p.longitud.toFixed(5)}</span>
                            </div>
                        `).join('');
                        
                        policias.forEach(p => {
                            const marker = L.circleMarker([p.latitud, p.longitud], getPoliciaStyle())
                                .addTo(map)
                                .bindPopup(`👮 ${p.usuarios?.nombre_completo || 'Policía'}`);
                            policiasMarkers.push(marker);
                        });
                    } else {
                        document.getElementById('policias').innerHTML = '<div class="sin-datos">No hay policías disponibles</div>';
                    }
                } catch (err) {
                    console.error('Error en cargarPolicias:', err);
                }
            }
            
            // ============================================
            // ACTUALIZAR TODO EL DASHBOARD
            // ============================================
            async function actualizarDashboard() {
                console.log('🔄 Actualizando dashboard...');
                await cargarEmergencia();
                await cargarPolicias();
            }
            
            // ============================================
            // INICIALIZACIÓN
            // ============================================
            function iniciar() {
                initMap();
                actualizarDashboard();
                if (intervalo) clearInterval(intervalo);
                intervalo = setInterval(actualizarDashboard, 8000);
                document.getElementById('btnRefresh').addEventListener('click', actualizarDashboard);
            }
            
            // Arrancar todo
            iniciar();
        })();
    </script>
</body>
</html>
